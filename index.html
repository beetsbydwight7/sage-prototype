<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sage — AI Meal Planning App Prototype</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    
    /* Support for older safari backdrop-filter */
    div {
      -webkit-backdrop-filter: var(--backdrop-filter);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;


// ============ DESIGN TOKENS ============
const C = {
  sage: "#406D4D",
  sageDk: "#2E553A",
  sageLt: "#EAF3EB",
  amber: "#D4A039",
  cream: "#FFF3DC",
  warmWhite: "#FAFAF7",
  white: "#FFFFFF",
  charcoal: "#1C2A1E", // Deep olive charcoal
  warmGray: "#64746A", // Sage-tinted medium gray
  stone: "#9C9A8E",
  linen: "#E8EAE6",
  forest: "#284A33",
  tomato: "#C94A3D",
};

// ============ SHARED COMPONENTS ============
const PhoneFrame = ({ children }) => (
  <div style={{
    width: 393, minHeight: 852, maxHeight: 852, overflow: "hidden",
    background: C.warmWhite, borderRadius: 40, position: "relative",
    boxShadow: "0 2px 10px rgba(0,0,0,0.02), 0 24px 64px rgba(0,0,0,0.12)", 
    fontFamily: "system-ui, -apple-system, 'SF Pro Display', sans-serif",
  }}>
    {/* Status bar */}
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 28px 0", position: "absolute", top: 0, left: 0, right: 0, zIndex: 50 }}>
      <span style={{ fontSize: 15, fontWeight: 600, color: C.charcoal }}>9:41</span>
      <div style={{ display: "flex", gap: 5, alignItems: "center" }}>
        <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="1" fill={C.charcoal}/><rect x="4.5" y="2" width="3" height="10" rx="1" fill={C.charcoal}/><rect x="9" y="0" width="3" height="12" rx="1" fill={C.charcoal}/><rect x="13.5" y="0" width="3" height="12" rx="1" fill={C.linen}/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.4C5.6 2.4 3.4 3.4 1.8 5L0 3.2C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.2L14.2 5C12.6 3.4 10.4 2.4 8 2.4z" fill={C.charcoal}/><path d="M8 6.8c-1.5 0-2.8.6-3.8 1.6L2.4 6.6C3.9 5.1 5.8 4.4 8 4.4s4.1.7 5.6 2.2l-1.8 1.8c-1-.9-2.3-1.6-3.8-1.6z" fill={C.charcoal}/><circle cx="8" cy="10.5" r="1.5" fill={C.charcoal}/></svg>
        <svg width="27" height="12" viewBox="0 0 27 12"><rect x="0" y="0.5" width="23" height="11" rx="3.5" stroke={C.charcoal} strokeWidth="1" fill="none"/><rect x="24" y="3.5" width="2.5" height="5" rx="1" fill={C.charcoal} opacity="0.4"/><rect x="2" y="2.5" width="17" height="7" rx="2" fill={C.forest}/></svg>
      </div>
    </div>
    <div style={{ height: 852, overflowY: "auto", overflowX: "hidden" }}>{children}</div>
    {/* Home indicator */}
    <div style={{ position: "absolute", bottom: 8, left: "50%", transform: "translateX(-50%)", width: 134, height: 5, borderRadius: 3, background: C.charcoal, opacity: 0.2 }}/>
  </div>
);

const TabBar = ({ active, onNavigate }) => (
  <div style={{
    position: "absolute", bottom: 0, left: 0, right: 0, height: 88, 
    background: "rgba(255, 255, 255, 0.85)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
    borderTop: `1px solid rgba(0,0,0,0.06)`, display: "flex", paddingTop: 10, paddingBottom: 24,
    boxShadow: "0 -4px 24px rgba(0,0,0,0.03)", zIndex: 100,
  }}>
    {[
      { id: "plan", label: "Plan", svg: (c) => <svg width="26" height="26" viewBox="0 0 24 24" fill={c === C.sage ? C.sageLt : "none"} stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="4" x2="9" y2="10"/></svg> },
      { id: "recipes", label: "Recipes", svg: (c) => <svg width="26" height="26" viewBox="0 0 24 24" fill={c === C.sage ? C.sageLt : "none"} stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg> },
      { id: "grocery", label: "Grocery", svg: (c) => <svg width="26" height="26" viewBox="0 0 24 24" fill={c === C.sage ? C.sageLt : "none"} stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg> },
      { id: "profile", label: "Profile", svg: (c) => <svg width="26" height="26" viewBox="0 0 24 24" fill={c === C.sage ? C.sageLt : "none"} stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
    ].map(tab => {
      const isActive = active === tab.id;
      const color = isActive ? C.sage : C.warmGray;
      return (
      <button key={tab.id} onClick={() => onNavigate(tab.id)} style={{
        flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
        background: "none", border: "none", cursor: "pointer", padding: 0,
        color: color,
      }}>
        {tab.svg(color)}
        <span style={{ fontSize: 12, fontWeight: isActive ? 700 : 500, color: color, letterSpacing: isActive ? 0 : 0.2 }}>{tab.label}</span>
      </button>
    );})}
  </div>
);

const Chip = ({ label, selected, onClick }) => (
  <button onClick={onClick} style={{
    padding: "8px 16px", borderRadius: 18, border: `1.5px solid ${selected ? C.sage : C.linen}`,
    background: selected ? C.sage : C.white, color: selected ? C.white : C.charcoal,
    fontSize: 13, fontWeight: 500, cursor: "pointer", 
    transition: "transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background-color 0.2s, border-color 0.2s",
    transform: "scale(1)",
  }}
  onMouseDown={(e) => e.currentTarget.style.transform = "scale(0.95)"}
  onMouseUp={(e) => e.currentTarget.style.transform = "scale(1)"}
  onMouseLeave={(e) => e.currentTarget.style.transform = "scale(1)"}
  >{label}</button>
);

const ProgressDots = ({ active, total }) => (
  <div style={{ display: "flex", gap: 12, justifyContent: "center", padding: "16px 0" }}>
    {Array.from({ length: total }).map((_, i) => (
      <div key={i} style={{
        width: 8, height: 8, borderRadius: 4,
        background: i === active ? C.sage : C.linen,
        transition: "background 0.2s ease",
      }}/>
    ))}
  </div>
);

const Button = ({ children, onClick, variant = "primary", style: extraStyle }) => (
  <button onClick={onClick} style={{
    width: "100%", padding: "16px 0", borderRadius: 12, border: "none", cursor: "pointer",
    fontSize: 17, fontWeight: 600, 
    transition: "transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s, opacity 0.2s",
    background: variant === "primary" ? `linear-gradient(180deg, #E6B553 0%, ${C.amber} 100%)` : "transparent",
    color: variant === "primary" ? C.white : C.charcoal,
    boxShadow: variant === "primary" ? "0 4px 12px rgba(212, 160, 57, 0.3), inset 0 1px 0 rgba(255,255,255,0.3)" : "none",
    ...extraStyle,
  }}
  onMouseDown={(e) => e.currentTarget.style.transform = "scale(0.97)"}
  onMouseUp={(e) => e.currentTarget.style.transform = "scale(1)"}
  onMouseLeave={(e) => e.currentTarget.style.transform = "scale(1)"}
  >{children}</button>
);

// ============ SUBTITLE OPTIONS (toggle in prototype) ============
const SUBTITLE_OPTIONS = [
  "Every recipe. One place.",
  "Meal planning, simplified.",
  "Your family's recipe vault.",
];

// ============ ONBOARDING SCREENS ============
const Welcome = ({ onNext, subtitleIndex = 0, onSubtitleChange }) => {
  const [phase, setPhase] = useState(0);
  const [shinePos, setShinePos] = useState(-60);

  useEffect(() => {
    const timers = [
      setTimeout(() => setPhase(1), 200),
      setTimeout(() => setPhase(2), 700),
      setTimeout(() => setPhase(3), 1200),
      setTimeout(() => setPhase(4), 1800),
      setTimeout(() => setPhase(5), 2500),
    ];
    return () => timers.forEach(clearTimeout);
  }, []);

  // Shine sweep after photo appears
  useEffect(() => {
    if (phase >= 4) {
      const t = setTimeout(() => setShinePos(120), 400);
      return () => clearTimeout(t);
    }
  }, [phase]);

  return (
    <div style={{ height: 852, display: "flex", flexDirection: "column" }}>
      <div style={{
        background: `linear-gradient(135deg, ${C.sage} 0%, ${C.sageDk} 60%, ${C.forest} 100%)`,
        height: 470, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 6,
        borderBottomLeftRadius: 32, borderBottomRightRadius: 32, position: "relative", overflow: "hidden",
      }}>
        {/* Subtle background texture dots */}
        <div style={{
          position: "absolute", top: 0, left: 0, right: 0, bottom: 0, opacity: 0.04,
          backgroundImage: "radial-gradient(circle, white 1px, transparent 1px)",
          backgroundSize: "24px 24px",
        }}/>


        {/* Logo lockup — "Sage" centered on page, leaf positioned to its left */}
        <div style={{
          position: "relative", zIndex: 1, marginBottom: 4,
          opacity: phase >= 1 ? 1 : 0, transform: phase >= 1 ? "scale(1)" : "scale(0.85)",
          transition: "all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)",
        }}>
          {/* Leaf mark — positioned to the left of the centered wordmark */}
          <img src="./sage_leaf_sparkle_logo_1775099137451.png" width="48" height="48" style={{
            position: "absolute", right: "100%", marginRight: 12, top: "50%", transform: "translateY(-50%)",
            borderRadius: 10, boxShadow: "0 8px 24px rgba(0,0,0,0.3)"
          }} alt="Sage Logo" />
          {/* Wordmark — this element is what's actually centered */}
          <h1 style={{
            color: C.white, fontSize: 46, fontWeight: 700, margin: 0,
            fontFamily: "ui-serif, \"New York\", Charter, Georgia, serif", letterSpacing: 4,
            textAlign: "center",
            opacity: phase >= 2 ? 1 : 0, transform: phase >= 2 ? "translateX(0)" : "translateX(-12px)",
            transition: "all 0.6s ease-out",
          }}>Sage</h1>
        </div>

        {/* Decorative line — phase 2 */}
        <div style={{
          height: 1.5, background: "rgba(255,255,255,0.3)", borderRadius: 1, marginTop: 0, position: "relative", zIndex: 1,
          width: phase >= 2 ? 70 : 0, transition: "width 0.8s ease-out 0.2s",
        }}/>

        {/* Subtitle — phase 3 */}
        <p style={{
          color: "rgba(255,255,255,0.85)", fontSize: 17, margin: "4px 0 0", fontWeight: 500,
          letterSpacing: 0.3, position: "relative", zIndex: 1,
          opacity: phase >= 3 ? 1 : 0, transform: phase >= 3 ? "translateX(0)" : "translateX(-28px)",
          transition: "all 0.6s ease-out",
        }}>{SUBTITLE_OPTIONS[subtitleIndex]}</p>

        {/* Food illustration — phase 4 */}
        <div style={{
          marginTop: 16, width: 300, height: 160, borderRadius: 16,
          overflow: "hidden", position: "relative", zIndex: 1,
          opacity: phase >= 4 ? 1 : 0,
          transform: phase >= 4 ? "scale(1)" : "scale(0.92)",
          boxShadow: phase >= 4 ? "0 8px 32px rgba(0,0,0,0.25)" : "none",
          transition: "opacity 0.8s ease-out, transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.8s ease-out",
          border: "1px solid rgba(255,255,255,0.15)",
        }}>
          {/* Overhead meal prep SVG scene */}
          <img src="./sage_hero_background_1775096662006.png" style={{ display: "block", width: "100%", height: "100%", objectFit: "cover" }} alt="Hero meal prep" />
          {/* Shine sweep — pure inline transition */}
          <div style={{
            position: "absolute", top: 0, bottom: 0, width: "50%",
            background: "linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent)",
            left: `${shinePos}%`,
            transition: "left 1s ease-out",
            pointerEvents: "none",
          }}/>
          {/* Soft gradient overlay at bottom of photo */}
          <div style={{
            position: "absolute", bottom: 0, left: 0, right: 0, height: 40,
            background: "linear-gradient(transparent, rgba(61,107,74,0.5))",
            pointerEvents: "none",
          }}/>
        </div>
      </div>

      {/* Bottom content — phase 5 */}
      <div style={{ flex: 1, padding: "28px 32px 20px", display: "flex", flexDirection: "column", alignItems: "center" }}>
        <h2 style={{
          fontSize: 28, fontWeight: 700, color: C.charcoal, textAlign: "center", margin: "0 0 10px", lineHeight: 1.2,
          fontFamily: "ui-serif, \"New York\", Charter, Georgia, serif",
          opacity: phase >= 5 ? 1 : 0, transform: phase >= 5 ? "translateY(0)" : "translateY(16px)",
          transition: "all 0.6s ease-out",
        }}>Your recipes. Your plan.{"\n"}Your evenings back.</h2>
        <p style={{
          fontSize: 15, color: C.warmGray, textAlign: "center", lineHeight: 1.55, margin: "0 0 12px",
          opacity: phase >= 5 ? 1 : 0, transform: phase >= 5 ? "translateY(0)" : "translateY(16px)",
          transition: "all 0.6s ease-out 0.15s",
        }}>
          Save the recipes your family loves — then let Sage turn your collection into weekly meal plans, grocery lists, and dinner answers in seconds.
        </p>
        {/* Ownership promise — front and center */}
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginBottom: 20,
          opacity: phase >= 5 ? 1 : 0, transition: "opacity 0.6s ease-out 0.25s",
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.amber} strokeWidth="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span style={{ fontSize: 12, fontWeight: 600, color: C.amber }}>Your recipes are yours forever — even if you cancel.</span>
        </div>
        <div style={{
          marginTop: "auto", width: "100%",
          opacity: phase >= 5 ? 1 : 0, transform: phase >= 5 ? "translateY(0)" : "translateY(16px)",
          transition: "all 0.6s ease-out 0.3s",
        }}>
          <Button onClick={onNext}>Get Started</Button>
          <ProgressDots active={0} total={6}/>
        </div>
      </div>
    </div>
  );
};

const ScatteredRecipes = ({ onNext, onBack }) => (
  <div style={{ height: 852, display: "flex", flexDirection: "column", padding: "54px 28px 20px" }}>
    {/* Back button */}
    <button onClick={onBack} style={{
      width: 36, height: 36, borderRadius: 18, background: C.sageLt, border: "none", cursor: "pointer",
      display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 4,
    }}>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.sage} strokeWidth="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    {/* Illustration: scattered recipe sources */}
    <div style={{
      flex: 0, display: "flex", justifyContent: "center", alignItems: "center",
      padding: "24px 0 20px",
    }}>
      <div style={{ position: "relative", width: 260, height: 200 }}>
        {/* Scattered source cards */}
        {[
          { label: "Pinterest", icon: "P", x: 10, y: 8, rot: -6, bg: "#F0E4E4" },
          { label: "Screenshots", icon: "\uD83D\uDCF7", x: 140, y: 0, rot: 4, bg: "#E4E8F0" },
          { label: "Bookmarks", icon: "\u2605", x: 30, y: 80, rot: 3, bg: "#FFF3DC" },
          { label: "Texts from Mom", icon: "\uD83D\uDCAC", x: 150, y: 72, rot: -3, bg: "#E8F0E4" },
          { label: "Old Cookbooks", icon: "\uD83D\uDCD6", x: 70, y: 140, rot: -2, bg: "#F0E8E4" },
        ].map((card, i) => (
          <div key={i} style={{
            position: "absolute", left: card.x, top: card.y,
            width: 100, padding: "10px 8px", borderRadius: 10,
            background: card.bg, transform: `rotate(${card.rot}deg)`,
            boxShadow: "0 2px 8px rgba(0,0,0,0.08)",
            display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          }}>
            <span style={{ fontSize: 20 }}>{card.icon}</span>
            <span style={{ fontSize: 10, fontWeight: 600, color: C.charcoal, textAlign: "center" }}>{card.label}</span>
          </div>
        ))}
      </div>
    </div>

    {/* Copy */}
    <div style={{ textAlign: "center", padding: "0 8px" }}>
      <p style={{
        fontSize: 11, fontWeight: 600, letterSpacing: 1.5, textTransform: "uppercase",
        color: C.sage, marginBottom: 10,
      }}>The problem</p>
      <h2 style={{
        fontSize: 26, fontWeight: 700, color: C.charcoal, margin: "0 0 12px", lineHeight: 1.2,
        fontFamily: "ui-serif, \"New York\", Charter, Georgia, serif",
      }}>Your recipes are everywhere.</h2>
      <p style={{ fontSize: 15, color: C.warmGray, lineHeight: 1.6, margin: "0 0 8px" }}>
        Pinterest saves. Screenshot folders. Bookmarked blogs. Texts from mom. You have great recipes — they're just scattered across a dozen places.
      </p>
      <p style={{ fontSize: 15, color: C.warmGray, lineHeight: 1.6, margin: 0 }}>
        And you still end up asking{" "}
        <span style={{ fontStyle: "italic", color: C.charcoal, fontWeight: 500 }}>"what's for dinner?"</span>
      </p>
    </div>

    <div style={{ margin: "auto 0 0", padding: "12px 4px 0" }}>
      <Button onClick={onNext}>That's me — let's fix it</Button>
      <ProgressDots active={1} total={6}/>
    </div>
  </div>
);

// ============ SOLUTION BRIDGE ============
const SolutionBridge = ({ onNext, onBack }) => {
  const [phase, setPhase] = useState(0);

  useEffect(() => {
    const timers = [
      setTimeout(() => setPhase(1), 100),
      setTimeout(() => setPhase(2), 700),
      setTimeout(() => setPhase(3), 1300),
      setTimeout(() => setPhase(4), 1900),
    ];
    return () => timers.forEach(clearTimeout);
  }, []);

  const recipes = [
    { emoji: "🍝", name: "Pasta Night", time: "20 min", scatterX: 10, scatterY: 8, rot: -8 },
    { emoji: "🌮", name: "Taco Tuesday", time: "25 min", scatterX: 180, scatterY: 0, rot: 5 },
    { emoji: "🥗", name: "Greek Salad", time: "15 min", scatterX: 30, scatterY: 90, rot: 4 },
    { emoji: "🍲", name: "Beef Stew", time: "2 hrs", scatterX: 190, scatterY: 80, rot: -5 },
    { emoji: "🥘", name: "Stir Fry", time: "20 min", scatterX: 80, scatterY: 150, rot: 3 },
    { emoji: "🍕", name: "Pizza Night", time: "45 min", scatterX: 160, scatterY: 148, rot: -3 },
  ];

  const days = ["MON", "TUE", "WED", "THU", "FRI"];

  return (
    <div style={{ height: 852, display: "flex", flexDirection: "column", padding: "54px 28px 20px" }}>
      {/* Back button */}
      <button onClick={onBack} style={{
        width: 36, height: 36, borderRadius: 18, background: C.sageLt, border: "none", cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 4, flexShrink: 0,
      }}>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.sage} strokeWidth="2.5"><path d="M15 18l-6-6 6-6"/></svg>
      </button>

      {/* Header copy — fades in phase 4 */}
      <div style={{
        textAlign: "center", padding: "0 8px", marginBottom: 16,
        opacity: phase >= 4 ? 1 : 0, transform: phase >= 4 ? "translateY(0)" : "translateY(10px)",
        transition: "all 0.6s ease-out",
      }}>
        <p style={{
          fontSize: 11, fontWeight: 600, letterSpacing: 1.5, textTransform: "uppercase",
          color: C.sage, marginBottom: 10,
        }}>The solution</p>
        <h2 style={{
          fontSize: 26, fontWeight: 700, color: C.charcoal, margin: "0 0 8px", lineHeight: 1.2,
          fontFamily: "Georgia, 'Times New Roman', serif",
        }}>Sage brings it all together.</h2>
        <p style={{ fontSize: 15, color: C.warmGray, lineHeight: 1.5, margin: 0 }}>
          One place for every recipe. Personalized meal plans in seconds.
        </p>
      </div>

      {/* Scrollable middle area */}
      <div style={{ flex: 1, overflowY: "auto", paddingBottom: 120 }}>
        {/* Vault section label — fades in phase 2 */}
        <div style={{
          display: "flex", alignItems: "center", gap: 6, marginBottom: 10,
          opacity: phase >= 2 ? 1 : 0, transition: "opacity 0.4s ease-out",
        }}>
          <span style={{ fontSize: 16 }}>📖</span>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.sage }}>Your Recipe Vault</span>
        </div>

        {/* Recipe cards — scattered in phase 1, grid in phase 2+ */}
        <div style={{
          position: "relative",
          height: phase >= 2 ? "auto" : 200,
          display: phase >= 2 ? "grid" : "block",
          gridTemplateColumns: "repeat(3, 1fr)",
          gap: 8,
          marginBottom: 20,
          transition: "height 0.6s ease-out",
        }}>
          {recipes.map((r, i) => (
            <div key={r.name} style={{
              ...(phase < 2 ? {
                position: "absolute",
                left: r.scatterX,
                top: r.scatterY,
                width: 90,
                transform: `rotate(${r.rot}deg)`,
              } : {
                position: "relative",
                left: 0,
                top: 0,
                transform: "rotate(0deg)",
              }),
              background: C.white,
              borderRadius: 10,
              padding: "10px 6px",
              textAlign: "center",
              boxShadow: "0 2px 8px rgba(0,0,0,0.06)",
              border: `1px solid ${C.linen}`,
              transition: "all 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)",
              opacity: phase >= 1 ? 1 : 0,
              transitionDelay: `${i * 0.05}s`,
            }}>
              <div style={{ fontSize: 24, marginBottom: 4 }}>{r.emoji}</div>
              <p style={{

    { name: "Grandma's Tomato Soup", time: "45 min", emoji: "\uD83C\uDF45" },
  ];

  const toggleDay = (i) => setSelectedDays(prev => prev.includes(i) ? prev.filter(d => d !== i) : [...prev, i]);
  const toggleMeal = (m) => setSelectedMeals(prev => prev.includes(m) ? prev.filter(x => x !== m) : [...prev, m]);
  const toggleConstraint = (c) => setConstraints(prev => prev.includes(c) ? prev.filter(x => x !== c) : [...prev, c]);
  const toggleRecipe = (name) => setLockedRecipes(prev => prev.includes(name) ? prev.filter(x => x !== name) : [...prev, name]);
  const toggleGridCell = (key) => {
    setMealGrid(prev => {
      const wasOn = prev[key];
      if (wasOn) {
        // turning off — remove headcount too
        setHeadcounts(hc => { const next = { ...hc }; delete next[key]; return next; });
      } else {
        // turning on — set default headcount
        setHeadcounts(hc => ({ ...hc, [key]: defaultHeadcount }));
      }
      return { ...prev, [key]: !wasOn };
    });
  };
  const cycleHeadcount = (key, e) => {
    e.stopPropagation();
    setHeadcounts(prev => {
      const current = prev[key] || defaultHeadcount;
      return { ...prev, [key]: current >= 6 ? 1 : current + 1 };
    });
  };

  const initGrid = () => {
    const grid = {};
    const hc = {};
    selectedDays.forEach(d => {
      selectedMeals.forEach(m => {
        const key = d + "-" + m;
        grid[key] = true;
        hc[key] = defaultHeadcount;
      });
    });
    setMealGrid(grid);
    setHeadcounts(hc);
    setGridInitialized(true);
  };

  const activeSlots = Object.values(mealGrid).filter(Boolean).length;
  const totalSlots = gridInitialized ? activeSlots : selectedDays.length * selectedMeals.length;
  const stepLabels = ["Plan", "Customize"];

  const startGenerate = () => {
    setStep(2);
    const dotInterval = setInterval(() => setDots(d => (d + 1) % 4), 350);

  // Step indicator bar

        </div>
      ))}

  );

  // Step 0: Plan your week (days + meals combined)
  if (step === 0) return (

      <div style={{ padding: "54px 24px 0", flex: 1, overflowY: "auto" }}>

            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.sage} strokeWidth="2.5"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.charcoal, margin: 0, fontFamily: "Georgia, 'Times New Roman', serif" }}>New Meal Plan</h1>
        </div>
        <StepBar/>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: C.charcoal, margin: "0 0 6px", fontFamily: "Georgia, 'Times New Roman', serif" }}>Plan your week</h2>
        <p style={{ fontSize: 14, color: C.warmGray, margin: "0 0 16px" }}>Choose which days and meals to plan.</p>

        {/* Day presets */}
        <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
          <button onClick={() => setSelectedDays([0,1,2,3,4])} style={{
            flex: 1, padding: "9px 0", borderRadius: 10,
            border: `1.5px solid ${selectedDays.length === 5 && !selectedDays.includes(5) ? C.sage : C.linen}`,
            background: selectedDays.length === 5 && !selectedDays.includes(5) ? C.sageLt : C.white,
            color: C.sage, fontSize: 12, fontWeight: 600, cursor: "pointer",
          }}>Weekdays</button>
          <button onClick={() => setSelectedDays([0,1,2,3,4,5,6])} style={{
            flex: 1, padding: "9px 0", borderRadius: 10,
            border: `1.5px solid ${selectedDays.length === 7 ? C.sage : C.linen}`,
            background: selectedDays.length === 7 ? C.sageLt : C.white,
            color: C.sage, fontSize: 12, fontWeight: 600, cursor: "pointer",
          }}>Full Week</button>
        </div>

        {/* Day chips — compact row */}
        <div style={{ display: "flex", gap: 4, marginBottom: 20 }}>
          {days.map((d, i) => (
            <button key={i} onClick={() => toggleDay(i)} style={{
              flex: 1, padding: "10px 0", borderRadius: 10, textAlign: "center",
              background: selectedDays.includes(i) ? C.sage : C.white,
              border: `1.5px solid ${selectedDays.includes(i) ? C.sage : C.linen}`,
              cursor: "pointer", transition: "all 0.15s ease",
            }}>
              <span style={{ fontSize: 13, fontWeight: 600, color: selectedDays.includes(i) ? C.white : C.charcoal }}>{d.short}</span>
            </button>
          ))}
        </div>

        {/* Meal types */}
        <p style={{ fontSize: 13, fontWeight: 600, color: C.warmGray, margin: "0 0 8px", textTransform: "uppercase", letterSpacing: 0.5 }}>Meals</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 16 }}>
          {mealTypes.map((m) => {
            const icons = { Breakfast: "\u2615", Lunch: "\uD83E\uDD57", Dinner: "\uD83C\uDF73", Snack: "\uD83C\uDF4E" };
            const descs = { Breakfast: "Start the day right", Lunch: "Midday fuel", Dinner: "The main event", Snack: "Between-meal bites" };
            const sel = selectedMeals.includes(m);
            return (
              <button key={m} onClick={() => toggleMeal(m)} style={{
                display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",
                background: sel ? C.sageLt + "80" : C.white, borderRadius: 12,
                border: `1.5px solid ${sel ? C.sage : C.linen}`,
                cursor: "pointer", transition: "all 0.15s ease", width: "100%", textAlign: "left",
              }}>
                <span style={{ fontSize: 22 }}>{icons[m]}</span>
                <div style={{ flex: 1 }}>
                  <p style={{ fontSize: 15, fontWeight: 600, color: C.charcoal, margin: 0 }}>{m}</p>
                  <p style={{ fontSize: 11, color: C.warmGray, margin: 0 }}>{descs[m]}</p>
                </div>
                <div style={{
                  width: 24, height: 24, borderRadius: 12,
                  border: `2px solid ${sel ? C.sage : C.linen}`,
                  background: sel ? C.sage : C.white,
                  display: "flex", alignItems: "center", justifyContent: "center",
                  transition: "all 0.15s ease",
                }}>
                  {sel && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>}
                </div>
              </button>
            );
          })}
        </div>

        {/* Summary chip */}
        <div style={{
          padding: "10px 14px", borderRadius: 12, background: C.cream,
          display: "flex", alignItems: "center", gap: 8, marginBottom: 16,
        }}>
          <span style={{ fontSize: 16 }}>{"\uD83D\uDCCB"}</span>
          <p style={{ fontSize: 13, color: C.charcoal, margin: 0 }}>
            <span style={{ fontWeight: 600 }}>{totalSlots} meal slots</span>
            <span style={{ color: C.warmGray }}> across {selectedDays.length} days</span>
          </p>
        </div>
      </div>

      {/* Pinned bottom button */}
      <div style={{
        padding: "12px 24px 28px", background: C.warmWhite,
        borderTop: `1px solid ${C.linen}`,
      }}>
        <Button onClick={() => { initGrid(); setStep(1); }} disabled={selectedDays.length === 0 || selectedMeals.length === 0}>Next — Customize</Button>
      </div>
    </div>
  );

  // Step 1: Customize (constraints, batch cook, lock recipes, advanced grid)
  if (step === 1) return (
    <div style={{ height: 852, position: "relative", display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "54px 24px 0", flex: 1, overflowY: "auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
          <button onClick={() => setStep(0)} style={{
            width: 36, height: 36, borderRadius: 18, background: C.sageLt, border: "none", cursor: "pointer",
            display: "flex", alignItems: "center", justifyContent: "center",
          }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.sage} strokeWidth="2.5"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.charcoal, margin: 0, fontFamily: "Georgia, 'Times New Roman', serif" }}>New Meal Plan</h1>
        </div>
        <StepBar/>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: C.charcoal, margin: "0 0 6px", fontFamily: "Georgia, 'Times New Roman', serif" }}>Customize your plan</h2>
        <p style={{ fontSize: 14, color: C.warmGray, margin: "0 0 16px" }}>All optional — skip straight to generate if you'd like.</p>

        {/* Constraints */}
        <p style={{ fontSize: 13, fontWeight: 600, color: C.warmGray, margin: "0 0 8px", textTransform: "uppercase", letterSpacing: 0.5 }}>This week's priorities</p>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 20 }}>
          {constraintOptions.map((c) => {
            const sel = constraints.includes(c.label);
            return (
              <button key={c.label} onClick={() => toggleConstraint(c.label)} style={{
                display: "flex", alignItems: "center", gap: 6, padding: "8px 14px",
                background: sel ? C.sageLt + "80" : C.white, borderRadius: 20,
                border: `1.5px solid ${sel ? C.sage : C.linen}`,
                cursor: "pointer", transition: "all 0.15s ease",
              }}>
                <span style={{ fontSize: 14 }}>{c.icon}</span>
                <span style={{ fontSize: 12, fontWeight: 600, color: sel ? C.sage : C.charcoal }}>{c.label}</span>
              </button>
            );
          })}
        </div>

        {/* Batch Cook */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <span style={{ fontSize: 18 }}>{"\uD83C\uDF73"}</span>
            <p style={{ fontSize: 14, fontWeight: 700, color: C.charcoal, margin: 0 }}>Batch cook day</p>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
            {[0, 1, 2, 3, 4, 5, 6].map(d => (
              <button key={d} onClick={() => setBatchDay(batchDay === d ? null : d)} style={{
                padding: "8px 12px", borderRadius: 10,
                border: `1.5px solid ${batchDay === d ? C.amber : C.linen}`,
                background: batchDay === d ? C.cream : C.white,
                cursor: "pointer", transition: "all 0.15s ease",
              }}>
                <span style={{ fontSize: 12, fontWeight: 600, color: batchDay === d ? C.amber : C.charcoal }}>{days[d].short}</span>
              </button>
            ))}
          </div>
          {batchDay !== null && (
            <p style={{ fontSize: 11, color: C.warmGray, margin: "6px 0 0", lineHeight: 1.4 }}>
              Sage will plan meals that store well and group prep for {days[batchDay].full}.
            </p>
          )}
        </div>

        {/* Lock in vault recipes */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.charcoal} strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <p style={{ fontSize: 14, fontWeight: 700, color: C.charcoal, margin: 0 }}>Lock in favorites</p>
            <span style={{ fontSize: 11, color: C.stone, marginLeft: "auto" }}>Optional</span>
          </div>

          {/* Show existing vault-assigned recipes */}
          {Object.keys(existingAssignments).length > 0 && (
            <div style={{
              padding: "10px 12px", borderRadius: 10, marginBottom: 8,
              background: C.sageLt + "40", border: `1px solid ${C.sage}20`,
            }}>
              <p style={{ fontSize: 11, fontWeight: 600, color: C.sage, margin: "0 0 4px" }}>
                {Object.keys(existingAssignments).length} vault pick{Object.keys(existingAssignments).length > 1 ? "s" : ""} already on your plan
              </p>
              {Object.entries(existingAssignments).map(([key, name]) => {
                const [dayIdx, mealType] = key.split("-");
                const dayNames = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
                return (
                  <span key={key} style={{ fontSize: 10, color: C.warmGray }}>{name} ({dayNames[dayIdx]} {mealType}){key !== Object.keys(existingAssignments).at(-1) ? " · " : ""}</span>
                );
              })}
            </div>
          )}

          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            {vaultRecipes.map((r) => {
              const sel = lockedRecipes.includes(r.name);
              return (
                <button key={r.name} onClick={() => toggleRecipe(r.name)} style={{
                  display: "flex", alignItems: "center", gap: 10, padding: "10px 12px",
                  background: sel ? C.sageLt + "60" : C.white, borderRadius: 10,
                  border: `1.5px solid ${sel ? C.sage : C.linen}`,
                  cursor: "pointer", transition: "all 0.15s ease", width: "100%", textAlign: "left",
                }}>
                  <div style={{
                    width: 36, height: 36, borderRadius: 8, flexShrink: 0,
                    background: sel ? C.sage : C.linen,
                    display: "flex", alignItems: "center", justifyContent: "center",
                    transition: "all 0.15s ease",
                  }}>
                    {sel ? (
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><path d="M20 6L9 17l-5-5"/></svg>
                    ) : (
                      <span style={{ fontSize: 16 }}>{r.emoji}</span>
                    )}
                  </div>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontSize: 13, fontWeight: 600, color: C.charcoal, margin: 0 }}>{r.name}</p>
                    <p style={{ fontSize: 10, color: C.warmGray, margin: 0 }}>{r.time}</p>
                  </div>
                  {sel && <span style={{ fontSize: 10, fontWeight: 600, color: C.sage }}>Locked</span>}
                </button>
              );
            })}
          </div>
        </div>

        {/* Advanced: Fine-tune grid toggle */}
        <button onClick={() => setShowGrid(!showGrid)} style={{
          display: "flex", alignItems: "center", gap: 8, width: "100%", padding: "12px 14px",
          background: C.white, borderRadius: 12, border: `1px solid ${C.linen}`,
          cursor: "pointer", marginBottom: showGrid ? 12 : 20,
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.stone} strokeWidth="2"><path d="M12 3v18M3 12h18"/></svg>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.charcoal, flex: 1, textAlign: "left" }}>Fine-tune meal grid</span>
          <span style={{ fontSize: 11, color: C.stone }}>{showGrid ? "Hide" : "Advanced"}</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.stone} strokeWidth="2" style={{ transform: showGrid ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}><path d="M6 9l6 6 6-6"/></svg>
        </button>

        {showGrid && (
          <div style={{ marginBottom: 20 }}>
            <p style={{ fontSize: 12, color: C.warmGray, margin: "0 0 8px" }}>Tap cells to toggle. Tap the number to change servings.</p>
            <div style={{ overflowX: "auto", marginBottom: 12 }}>
              <div style={{ display: "grid", gridTemplateColumns: `72px repeat(${selectedDays.length}, 1fr)`, gap: 4 }}>
                <div/>
                {selectedDays.map(d => (
                  <div key={d} style={{ textAlign: "center", padding: "6px 0", fontSize: 10, fontWeight: 700, color: C.sage }}>{days[d].short}</div>
                ))}
                {selectedMeals.map(meal => (
                  <React.Fragment key={meal}>
                    <div style={{ display: "flex", alignItems: "center", padding: "0 2px", fontSize: 10, fontWeight: 600, color: C.charcoal, height: 44 }}>{meal}</div>
                    {selectedDays.map(d => {
                      const key = d + "-" + meal;
                      const on = mealGrid[key];
                      const count = headcounts[key] || defaultHeadcount;
                      return (
                        <div key={key} style={{
                          height: 44, borderRadius: 8, background: on ? C.sage : C.linen + "80",
                          display: "flex", alignItems: "center", justifyContent: "center",
                          transition: "all 0.15s ease", cursor: "pointer",
                        }} onClick={() => toggleGridCell(key)}>
                          {on ? (
                            <button onClick={(e) => cycleHeadcount(key, e)} style={{
                              background: "rgba(255,255,255,0.25)", border: "none", cursor: "pointer",
                              width: 24, height: 24, borderRadius: 12,
                              display: "flex", alignItems: "center", justifyContent: "center",
                              fontSize: 13, fontWeight: 700, color: C.white,
                            }}>{count}</button>
                          ) : (
                            <div style={{ width: 5, height: 5, borderRadius: 3, background: C.stone, opacity: 0.3 }}/>
                          )}
                        </div>
                      );
                    })}
                  </React.Fragment>
                ))}
              </div>
            </div>
            <p style={{ fontSize: 11, color: C.warmGray, margin: 0 }}>{activeSlots} of {totalSlots} slots active</p>
          </div>
        )}

        {/* Tell Sage anything */}
        <div style={{ marginBottom: 20 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
            <div style={{
              width: 24, height: 24, borderRadius: 12, background: C.amber + "20",
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={C.amber} strokeWidth="2.5"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4"/></svg>
            </div>
            <p style={{ fontSize: 14, fontWeight: 700, color: C.charcoal, margin: 0 }}>Tell Sage anything</p>
          </div>
          <div style={{
            position: "relative", borderRadius: 12, overflow: "hidden",
            border: `1.5px solid ${C.linen}`, background: C.white,
          }}>
            <div style={{
              minHeight: 60, padding: "10px 44px 10px 12px",
              fontSize: 13, color: C.stone, lineHeight: 1.5,
            }}>
              <span style={{ opacity: 0.6 }}>e.g. "Use up the leftover chicken" or "Kid-friendly dinner Friday for 6"</span>
            </div>
            <button style={{
              position: "absolute", bottom: 8, right: 8,
              width: 32, height: 32, borderRadius: 16, border: "none", cursor: "pointer",
              background: `linear-gradient(135deg, ${C.sage} 0%, #3D8B4F 100%)`,
              display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
                <rect x="9" y="1" width="6" height="13" rx="3"/>
                <path d="M5 10a7 7 0 0014 0"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
              </svg>
            </button>
          </div>
        </div>

        <div style={{ paddingBottom: 100 }}/>
      </div>

      {/* Pinned bottom buttons */}
      <div style={{
        position: "absolute", bottom: 0, left: 0, right: 0,
        padding: "12px 24px 28px",
        background: `linear-gradient(transparent, ${C.warmWhite} 16px)`,
      }}>
        <Button onClick={startGenerate}>
          Generate My Plan {lockedRecipes.length > 0 ? `(${lockedRecipes.length} locked)` : ""}
        </Button>
        <div style={{ marginTop: 6 }}>
          <Button variant="text" onClick={startGenerate}>Skip all — let Sage decide</Button>
        </div>
      </div>
    </div>
  );

  // Step 2: Generating
  return (
    <div style={{ height: 852, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "0 40px" }}>
      <div style={{ width: 64, height: 64, borderRadius: 32, background: C.sageLt, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 24 }}>
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke={C.sage} strokeWidth="2"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4m-3.93 7.07l-2.83-2.83M6.34 6.34L3.51 3.51"/><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="1.5s" repeatCount="indefinite"/></svg>
      </div>
      <h2 style={{ fontSize: 26, fontWeight: 700, color: C.charcoal, textAlign: "center", margin: "0 0 12px", fontFamily: "ui-serif, \"New York\", Charter, Georgia, serif" }}>
        Building your plan{"...".slice(0, dots)}
      </h2>
      <p style={{ fontSize: 15, color: C.warmGray, textAlign: "center", lineHeight: 1.5 }}>
        {lockedRecipes.length > 0
          ? `Keeping your ${lockedRecipes.length} locked recipe${lockedRecipes.length > 1 ? "s" : ""} and filling ${totalSlots - lockedRecipes.length} more slots.`
          : `Planning ${totalSlots} meals across ${selectedDays.length} days for your family.`}
      </p>
      {(constraints.length > 0 || batchDay !== null || Object.keys(existingAssignments).length > 0) && (
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, justifyContent: "center", marginTop: 16 }}>
          {Object.keys(existingAssignments).length > 0 && (
            <span style={{
              padding: "4px 10px", borderRadius: 8, background: C.sageLt,
              fontSize: 11, fontWeight: 600, color: C.sage,
              display: "flex", alignItems: "center", gap: 4,
            }}>
              <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke={C.sage} strokeWidth="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              {Object.keys(existingAssignments).length} vault pick{Object.keys(existingAssignments).length > 1 ? "s" : ""} preserved
            </span>
          )}
          {batchDay !== null && (
            <span style={{
              padding: "4px 10px", borderRadius: 8, background: C.cream,
              fontSize: 11, fontWeight: 600, color: C.amber,
            }}>{"\uD83C\uDF73"} Batch cook {days[batchDay].full}</span>
          )}
          {constraints.map(c => (
            <span key={c} style={{
              padding: "4px 10px", borderRadius: 8, background: C.cream,
              fontSize: 11, fontWeight: 500, color: C.amber,
            }}>{c}</span>
          ))}
        </div>
      )}
      <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 12, marginTop: 32 }}>
        {[0, 1, 2].map(i => (
          <div key={i} style={{
            display: "flex", gap: 12, padding: 12, background: C.white, borderRadius: 12,
            animation: `pulse 1.5s ease-in-out ${i * 0.2}s infinite`,
          }}>
            <div style={{ width: 56, height: 56, borderRadius: 8, background: C.linen, flexShrink: 0 }}/>
            <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 8, justifyContent: "center" }}>
              <div style={{ height: 14, borderRadius: 4, background: C.linen, width: "70%" }}/>
              <div style={{ height: 10, borderRadius: 4, background: C.linen, width: "50%" }}/>
            </div>
          </div>
        ))}
      </div>
      <style>{`@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }`}</style>
    </div>
  );
};

// ============ MAIN APP ============
function SagePrototype() {
  const [screen, setScreen] = useState("welcome");
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [recipeOrigin, setRecipeOrigin] = useState("plan"); // "plan" | "vault"
  const [subtitleIdx, setSubtitleIdx] = useState(0);
  const [planBatchDay, setPlanBatchDay] = useState(null);
  const [paywallOrigin, setPaywallOrigin] = useState("profile");
  const [planAssignments, setPlanAssignments] = useState({}); // key: "dayIndex-MealType" → recipe name
  const [favorites, setFavorites] = useState(["Mom's Lasagna", "Banana Pancakes"]); // seeded with a couple for demo

  const toggleFavorite = (name) => {
    setFavorites(prev => prev.includes(name) ? prev.filter(x => x !== name) : [...prev, name]);
  };

  const navigate = (id) => {
    if (id === "plan") setScreen("plan");
    else if (id === "grocery") setScreen("grocery");
    else if (id === "recipes") setScreen("vault");
    else if (id === "profile") setScreen("profile");
  };

  const handleAddToPlan = ({ recipe, dayIndex, mealType }) => {
    setPlanAssignments(prev => ({ ...prev, [`${dayIndex}-${mealType}`]: recipe }));
  };

  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: "linear-gradient(135deg, #1a1a17 0%, #2a2a26 100%)", padding: 40,
      flexDirection: "column", gap: 20,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}>
        <div style={{ width: 10, height: 10, borderRadius: 5, background: C.sage }}/>
        <span style={{ color: C.warmGray, fontSize: 13, fontWeight: 500, letterSpacing: 1, textTransform: "uppercase" }}>Sage — Interactive Prototype</span>
        <div style={{ width: 10, height: 10, borderRadius: 5, background: C.amber }}/>
      </div>

      <PhoneFrame>
        {screen === "welcome" && <Welcome onNext={() => setScreen("scattered")} subtitleIndex={subtitleIdx}/>}
        {screen === "scattered" && <ScatteredRecipes onNext={() => setScreen("solution")} onBack={() => setScreen("welcome")}/>}
        {screen === "solution" && <SolutionBridge onNext={() => setScreen("preferences")} onBack={() => setScreen("scattered")}/>}
        {screen === "preferences" && <Preferences onNext={() => setScreen("mealpicker")} onBack={() => setScreen("solution")}/>}
        {screen === "mealpicker" && <MealPicker onNext={() => setScreen("generating")} onBack={() => setScreen("preferences")}/>}
        {screen === "generating" && <GeneratingPlan onDone={() => setScreen("planready")}/>}
        {screen === "planready" && <PlanReady onViewPlan={() => setScreen("plan")}/>}
        {screen === "plan" && <WeeklyPlan onRecipeTap={(meal) => { setSelectedRecipe(meal); setRecipeOrigin("plan"); setScreen("recipe"); }} onNavigate={navigate} onNewPlan={() => { setPaywallOrigin("plan"); setScreen("paywall"); }} batchDay={planBatchDay} planAssignments={planAssignments}/>}
        {screen === "newplan" && <NewPlanBuilder onBack={() => setScreen("plan")} onDone={(batchDayVal) => { setPlanBatchDay(batchDayVal ?? null); setScreen("plan"); }} existingAssignments={planAssignments}/>}
        {screen === "vault" && <RecipeVault onNavigate={navigate} onRecipeTap={(meal) => { setSelectedRecipe(meal); setRecipeOrigin("vault"); setScreen("recipe"); }} onImport={() => setScreen("import")} favorites={favorites} onToggleFavorite={toggleFavorite}/>}
        {screen === "import" && <URLImportFlow onBack={() => setScreen("vault")} onNavigate={navigate}/>}
        {screen === "recipe" && <RecipeDetail recipe={selectedRecipe} origin={recipeOrigin} onBack={(dest) => setScreen(dest || recipeOrigin)} onAddToPlan={handleAddToPlan} isFavorite={favorites.includes(selectedRecipe?.name)} onToggleFavorite={toggleFavorite}/>}
        {screen === "grocery" && <GroceryList onNavigate={navigate}/>}
        {screen === "profile" && <Profile onNavigate={navigate} onUpgrade={() => { setPaywallOrigin("profile"); setScreen("paywall"); }}/>}
        {screen === "paywall" && <Paywall onClose={() => setScreen(paywallOrigin)} onSubscribe={() => setScreen("plan")}/>}
      </PhoneFrame>

      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
        {["welcome", "scattered", "solution", "preferences", "mealpicker", "planready", "plan", "newplan", "vault", "import", "grocery", "profile", "paywall"].map(s => (
          <button key={s} onClick={() => setScreen(s)} style={{
            padding: "6px 14px", borderRadius: 8, border: `1px solid ${screen === s ? C.sage : "rgba(255,255,255,0.1)"}`,
            background: screen === s ? C.sage : "transparent", color: screen === s ? C.white : C.warmGray,
            fontSize: 12, fontWeight: 500, cursor: "pointer", textTransform: "capitalize",
          }}>{s}</button>
        ))}
      </div>

      {screen === "welcome" && (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, marginTop: 4 }}>
          <span style={{ color: C.warmGray, fontSize: 11, textTransform: "uppercase", letterSpacing: 1 }}>Subtitle options</span>
          <div style={{ display: "flex", gap: 6 }}>
            {SUBTITLE_OPTIONS.map((opt, i) => (
              <button key={i} onClick={() => setSubtitleIdx(i)} style={{
                padding: "6px 12px", borderRadius: 8,
                border: `1px solid ${subtitleIdx === i ? C.amber : "rgba(255,255,255,0.1)"}`,
                background: subtitleIdx === i ? C.amber : "transparent",
                color: subtitleIdx === i ? C.white : C.warmGray,
                fontSize: 11, fontWeight: 500, cursor: "pointer",
              }}>{opt}</button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<SagePrototype />);
  </script>
</body>
