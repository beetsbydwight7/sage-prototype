<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sage — AI Meal Planning App Prototype</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body { background: #111110; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    ::-webkit-scrollbar { width: 0; height: 0; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes checkPop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

// ============ DESIGN SYSTEM ============
const C = {
  // Primary
  sage: "#3B7A57",
  sageHover: "#347050",
  sageLt: "#E6F2EC",
  sageUltraLt: "#F4F9F6",
  // Accent
  gold: "#C8963E",
  goldLt: "#FFF6E8",
  goldUltraLt: "#FFFBF2",
  // Neutrals
  bg: "#FAFBF9",
  surface: "#FFFFFF",
  text: "#1A1D1B",
  textSecondary: "#5A6058",
  textTertiary: "#8E9490",
  border: "#E8EBE9",
  divider: "#F0F2F0",
  // Semantic
  error: "#D94040",
  errorLt: "#FEF2F2",
  success: "#2D9D5A",
  successLt: "#ECFDF5",
  // Specific
  forest: "#2E6B45",
  charcoal: "#1A1D1B",
  warmGray: "#5A6058",
  stone: "#8E9490",
  linen: "#E8EBE9",
};

const SHADOW = {
  sm: "0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06)",
  md: "0 4px 12px rgba(0,0,0,0.06), 0 1px 4px rgba(0,0,0,0.04)",
  lg: "0 8px 24px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04)",
  xl: "0 20px 60px rgba(0,0,0,0.15), 0 8px 20px rgba(0,0,0,0.08)",
  phone: "0 25px 80px rgba(0,0,0,0.35), 0 8px 24px rgba(0,0,0,0.15)",
};

const R = { sm: 8, md: 12, lg: 16, xl: 20, xxl: 24, full: 9999 };

const FONT = {
  brand: "'DM Serif Display', Georgia, serif",
  body: "'Inter', -apple-system, system-ui, sans-serif",
};

// ============ SHARED COMPONENTS ============
const PhoneFrame = ({ children }) => (
  <div style={{
    width: 393, minHeight: 852, maxHeight: 852, overflow: "hidden",
    background: C.bg, borderRadius: 44, position: "relative",
    boxShadow: SHADOW.phone, fontFamily: FONT.body,
    border: "1px solid rgba(255,255,255,0.08)",
  }}>
    {/* Dynamic Island */}
    <div style={{
      position: "absolute", top: 10, left: "50%", transform: "translateX(-50%)",
      width: 126, height: 36, borderRadius: 20, background: "#000",
      zIndex: 60,
    }}/>
    {/* Status bar */}
    <div style={{
      display: "flex", justifyContent: "space-between", alignItems: "center",
      padding: "16px 30px 0", position: "absolute", top: 0, left: 0, right: 0, zIndex: 50,
    }}>
      <span style={{ fontSize: 15, fontWeight: 600, color: C.text, fontFamily: FONT.body }}>9:41</span>
      <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
        <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0.5" y="3" width="3" height="9" rx="1" fill={C.text}/><rect x="5" y="2" width="3" height="10" rx="1" fill={C.text}/><rect x="9.5" y="0.5" width="3" height="11.5" rx="1" fill={C.text}/><rect x="14" y="0.5" width="3" height="11.5" rx="1" fill={C.border} opacity="0.6"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.4C5.6 2.4 3.4 3.4 1.8 5L0 3.2C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.2L14.2 5C12.6 3.4 10.4 2.4 8 2.4z" fill={C.text}/><path d="M8 6.8c-1.5 0-2.8.6-3.8 1.6L2.4 6.6C3.9 5.1 5.8 4.4 8 4.4s4.1.7 5.6 2.2l-1.8 1.8c-1-.9-2.3-1.6-3.8-1.6z" fill={C.text}/><circle cx="8" cy="10.5" r="1.5" fill={C.text}/></svg>
        <svg width="27" height="13" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="22" height="12" rx="3.5" stroke={C.text} strokeWidth="1" fill="none" opacity="0.35"/><rect x="23.5" y="4" width="2.5" height="5" rx="1.25" fill={C.text} opacity="0.4"/><rect x="2" y="2" width="17" height="9" rx="2.5" fill={C.sage}/></svg>
      </div>
    </div>
    <div style={{ height: 852, overflowY: "auto", overflowX: "hidden" }}>{children}</div>
    {/* Home indicator */}
    <div style={{
      position: "absolute", bottom: 8, left: "50%", transform: "translateX(-50%)",
      width: 134, height: 5, borderRadius: 100, background: C.text, opacity: 0.15,
    }}/>
  </div>
);

const TabBar = ({ active, onNavigate }) => (
  <div style={{
    position: "absolute", bottom: 0, left: 0, right: 0, height: 84,
    background: "rgba(250,251,249,0.82)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
    borderTop: `0.5px solid ${C.border}`, display: "flex", paddingTop: 8, paddingBottom: 28,
  }}>
    {[
      { id: "plan", label: "Plan", icon: (c, f) => <svg width="24" height="24" viewBox="0 0 24 24" fill={f ? C.sageLt : "none"} stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="4" x2="9" y2="10"/></svg> },
      { id: "recipes", label: "Recipes", icon: (c, f) => <svg width="24" height="24" viewBox="0 0 24 24" fill={f ? C.sageLt : "none"} stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg> },
      { id: "grocery", label: "Grocery", icon: (c, f) => <svg width="24" height="24" viewBox="0 0 24 24" fill={f ? C.sageLt : "none"} stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg> },
      { id: "profile", label: "Profile", icon: (c, f) => <svg width="24" height="24" viewBox="0 0 24 24" fill={f ? C.sageLt : "none"} stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
    ].map(tab => {
      const isActive = active === tab.id;
      const color = isActive ? C.sage : C.textTertiary;
      return (
        <button key={tab.id} onClick={() => onNavigate(tab.id)} style={{
          flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
          background: "none", border: "none", cursor: "pointer", padding: 0, color,
          transition: "all 0.2s ease",
        }}>
          {tab.icon(color, isActive)}
          <span style={{
            fontSize: 10, fontWeight: isActive ? 600 : 500, color,
            letterSpacing: 0.2,
          }}>{tab.label}</span>
        </button>
      );
    })}
  </div>
);

const Chip = ({ label, selected, onClick }) => (
  <button onClick={onClick} style={{
    padding: "8px 16px", borderRadius: R.full, border: `1.5px solid ${selected ? C.sage : C.border}`,
    background: selected ? C.sage : C.surface, color: selected ? C.surface : C.text,
    fontSize: 13, fontWeight: 500, cursor: "pointer", transition: "all 0.2s ease",
    fontFamily: FONT.body,
  }}>{label}</button>
);

const ProgressDots = ({ active, total }) => (
  <div style={{ display: "flex", gap: 8, justifyContent: "center", padding: "16px 0" }}>
    {Array.from({ length: total }).map((_, i) => (
      <div key={i} style={{
        width: i === active ? 24 : 8, height: 8, borderRadius: 4,
        background: i === active ? C.sage : C.border,
        transition: "all 0.3s cubic-bezier(0.4, 0, 0.2, 1)",
      }}/>
    ))}
  </div>
);

const Button = ({ children, onClick, variant = "primary", style: extraStyle, disabled }) => (
  <button onClick={onClick} disabled={disabled} style={{
    width: "100%", padding: "16px 0", borderRadius: R.lg, border: "none", cursor: disabled ? "default" : "pointer",
    fontSize: 16, fontWeight: 600, transition: "all 0.2s ease",
    fontFamily: FONT.body, letterSpacing: -0.2,
    background: variant === "primary" ? `linear-gradient(135deg, ${C.sage} 0%, ${C.forest} 100%)` : "transparent",
    color: variant === "primary" ? C.surface : C.textTertiary,
    boxShadow: variant === "primary" ? `0 4px 16px ${C.sage}30` : "none",
    opacity: disabled ? 0.5 : 1,
    ...extraStyle,
  }}>{children}</button>
);

const GoldButton = ({ children, onClick, style: extraStyle }) => (
  <button onClick={onClick} style={{
    width: "100%", padding: "16px 0", borderRadius: R.lg, border: "none", cursor: "pointer",
    fontSize: 16, fontWeight: 600, transition: "all 0.2s ease",
    fontFamily: FONT.body, letterSpacing: -0.2,
    background: `linear-gradient(135deg, ${C.gold} 0%, #B8862E 100%)`,
    color: C.surface, boxShadow: `0 4px 16px ${C.gold}30`,
    ...extraStyle,
  }}>{children}</button>
);

const BackButton = ({ onClick }) => (
  <button onClick={onClick} style={{
    width: 40, height: 40, borderRadius: R.full, background: C.surface, border: `1px solid ${C.border}`,
    cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
    boxShadow: SHADOW.sm, transition: "all 0.15s ease", flexShrink: 0,
  }}>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={C.text} strokeWidth="2" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
);

const SectionLabel = ({ children, icon }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
    {icon && <span style={{ fontSize: 16 }}>{icon}</span>}
    <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase", color: C.sage }}>{children}</span>
  </div>
);

const ShimmerBlock = ({ width = "100%", height = 14, radius = 6, style: s }) => (
  <div style={{
    width, height, borderRadius: radius,
    background: `linear-gradient(90deg, ${C.divider} 0%, ${C.border} 50%, ${C.divider} 100%)`,
    backgroundSize: "200% 100%", animation: "shimmer 1.5s ease-in-out infinite", ...s,
  }}/>
);

// ============ SUBTITLE OPTIONS ============
const SUBTITLE_OPTIONS = [
  "Every recipe. One place.",
  "Meal planning, simplified.",
  "Your family's recipe vault.",
];

// ============ ONBOARDING: WELCOME ============
const Welcome = ({ onNext, subtitleIndex = 0 }) => {
  const [phase, setPhase] = useState(0);

  useEffect(() => {
    const timers = [
      setTimeout(() => setPhase(1), 200),
      setTimeout(() => setPhase(2), 600),
      setTimeout(() => setPhase(3), 1000),
      setTimeout(() => setPhase(4), 1500),
      setTimeout(() => setPhase(5), 2200),
    ];
    return () => timers.forEach(clearTimeout);
  }, []);

  return (
    <div style={{ height: 852, display: "flex", flexDirection: "column" }}>
      {/* Hero */}
      <div style={{
        background: `linear-gradient(160deg, ${C.sage} 0%, #2E6B45 50%, #1F5435 100%)`,
        height: 480, display: "flex", flexDirection: "column", alignItems: "center",
        justifyContent: "center", gap: 8,
        borderBottomLeftRadius: 36, borderBottomRightRadius: 36,
        position: "relative", overflow: "hidden",
      }}>
        {/* Subtle pattern */}
        <div style={{
          position: "absolute", inset: 0, opacity: 0.03,
          backgroundImage: "radial-gradient(circle, white 1px, transparent 1px)",
          backgroundSize: "28px 28px",
        }}/>
        {/* Ambient glow */}
        <div style={{
          position: "absolute", top: "20%", left: "50%", transform: "translate(-50%, -50%)",
          width: 300, height: 300, borderRadius: "50%",
          background: "radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%)",
        }}/>

        {/* Logo */}
        <div style={{
          position: "relative", zIndex: 1,
          opacity: phase >= 1 ? 1 : 0, transform: phase >= 1 ? "scale(1)" : "scale(0.8)",
          transition: "all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)",
        }}>
          <svg width="44" height="54" viewBox="0 0 70 88" fill="none" style={{
            position: "absolute", right: "100%", marginRight: 10, top: "50%", transform: "translateY(-50%)",
            opacity: phase >= 1 ? 1 : 0, transition: "opacity 0.6s ease 0.2s",
          }}>
            <path d="M42,4 C50,12 58,26 56,42 C54,56 48,64 40,68 C36,66 30,62 26,54 C20,42 22,24 32,10 C35,6 38,4 42,4Z" fill="rgba(255,255,255,0.9)"/>
            <path d="M38,66 C36,72 32,78 26,82" stroke="rgba(255,255,255,0.6)" strokeWidth="3" strokeLinecap="round" fill="none"/>
            <path d="M40,12 C39,20 38,36 37,50 C36.5,56 37,62 38,66" stroke="rgba(255,255,255,0.3)" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
            <path d="M34,74 L36,68 L38,74 L44,76 L38,78 L36,84 L34,78 L28,76Z" fill={C.gold}/>
          </svg>
          <h1 style={{
            color: C.surface, fontSize: 52, fontWeight: 400, margin: 0,
            fontFamily: FONT.brand, letterSpacing: 2,
            opacity: phase >= 2 ? 1 : 0, transform: phase >= 2 ? "translateY(0)" : "translateY(8px)",
            transition: "all 0.6s ease-out",
          }}>Sage</h1>
        </div>

        {/* Decorative line */}
        <div style={{
          width: phase >= 2 ? 48 : 0, height: 1.5, borderRadius: 1,
          background: "rgba(255,255,255,0.25)", transition: "width 0.5s ease-out 0.3s",
        }}/>

        {/* Subtitle */}
        <p style={{
          color: "rgba(255,255,255,0.75)", fontSize: 16, fontWeight: 400, letterSpacing: 0.3,
          position: "relative", zIndex: 1,
          opacity: phase >= 3 ? 1 : 0, transform: phase >= 3 ? "translateY(0)" : "translateY(12px)",
          transition: "all 0.6s ease-out",
        }}>{SUBTITLE_OPTIONS[subtitleIndex]}</p>

        {/* Food illustration */}
        <div style={{
          marginTop: 20, width: 300, height: 160, borderRadius: R.xl,
          overflow: "hidden", position: "relative", zIndex: 1,
          opacity: phase >= 4 ? 1 : 0, transform: phase >= 4 ? "scale(1) translateY(0)" : "scale(0.95) translateY(8px)",
          boxShadow: phase >= 4 ? "0 12px 40px rgba(0,0,0,0.3)" : "none",
          transition: "all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)",
        }}>
          <svg width="300" height="160" viewBox="0 0 300 160" style={{ display: "block" }}>
            <defs>
              <linearGradient id="tableGrad" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stopColor="#D4A574"/><stop offset="50%" stopColor="#C49A6C"/><stop offset="100%" stopColor="#B8906A"/>
              </linearGradient>
              <linearGradient id="saladGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#7CB342"/><stop offset="100%" stopColor="#558B2F"/>
              </linearGradient>
              <linearGradient id="soupGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#FF8A65"/><stop offset="100%" stopColor="#E64A19"/>
              </linearGradient>
              <linearGradient id="grainGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#F5E6C8"/><stop offset="100%" stopColor="#E8D5A8"/>
              </linearGradient>
              <linearGradient id="proteinGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor="#FFAB91"/><stop offset="100%" stopColor="#D4724E"/>
              </linearGradient>
              <radialGradient id="plateShine" cx="0.35" cy="0.3" r="0.65">
                <stop offset="0%" stopColor="rgba(255,255,255,0.15)"/><stop offset="100%" stopColor="rgba(255,255,255,0)"/>
              </radialGradient>
            </defs>
            <rect width="300" height="160" fill="url(#tableGrad)"/>
            <line x1="0" y1="35" x2="300" y2="38" stroke="#C49060" strokeWidth="0.5" opacity="0.3"/>
            <line x1="0" y1="72" x2="300" y2="70" stroke="#C49060" strokeWidth="0.5" opacity="0.2"/>
            <line x1="0" y1="110" x2="300" y2="112" stroke="#C49060" strokeWidth="0.5" opacity="0.25"/>
            <ellipse cx="90" cy="82" rx="58" ry="52" fill="#F5F5F0" stroke="#E0DDD5" strokeWidth="1.5"/>
            <ellipse cx="90" cy="82" rx="58" ry="52" fill="url(#plateShine)"/>
            <ellipse cx="90" cy="82" rx="46" ry="40" fill="#F0EDE5"/>
            <ellipse cx="88" cy="78" rx="38" ry="32" fill="url(#saladGrad)" opacity="0.9"/>
            <path d="M70 72 Q80 62 92 70 Q82 66 75 75Z" fill="#8BC34A" opacity="0.8"/>
            <path d="M95 68 Q105 58 110 68 Q102 64 98 72Z" fill="#9CCC65" opacity="0.7"/>
            <circle cx="75" cy="76" r="5" fill="#E53935"/><circle cx="102" cy="84" r="4.5" fill="#E53935"/>
            <circle cx="88" cy="74" r="2" fill="#FFF9C4" opacity="0.9"/>
            <circle cx="95" cy="78" r="2.2" fill="#FFF9C4" opacity="0.85"/>
            <rect x="175" y="12" width="80" height="58" rx="8" fill="#E8E4DC" stroke="#D5D0C8" strokeWidth="1"/>
            <rect x="180" y="17" width="70" height="48" rx="5" fill="url(#grainGrad)"/>
            <ellipse cx="210" cy="38" rx="18" ry="10" fill="url(#proteinGrad)" opacity="0.9"/>
            <circle cx="196" cy="48" r="5" fill="#4CAF50"/><circle cx="193" cy="45" r="4" fill="#66BB6A"/>
            <circle cx="230" cy="46" r="4" fill="#FF9800"/><circle cx="224" cy="50" r="3.5" fill="#FFB74D"/>
            <ellipse cx="220" cy="118" rx="38" ry="32" fill="#F5F5F0" stroke="#E0DDD5" strokeWidth="1.5"/>
            <ellipse cx="220" cy="118" rx="30" ry="24" fill="url(#soupGrad)" opacity="0.85"/>
            <path d="M208 114 Q220 108 230 116" stroke="#FFCC80" strokeWidth="1.5" fill="none" opacity="0.6"/>
            <circle cx="160" cy="90" r="11" fill="#FDD835"/><circle cx="160" cy="90" r="8" fill="#FFF176"/>
            <line x1="145" y1="20" x2="148" y2="55" stroke="#B0B0B0" strokeWidth="1.5" strokeLinecap="round"/>
            <rect width="300" height="160" fill="rgba(255,248,225,0.06)"/>
          </svg>
        </div>
      </div>

      {/* Bottom content */}
      <div style={{
        flex: 1, padding: "28px 28px 20px", display: "flex", flexDirection: "column", alignItems: "center",
      }}>
        <h2 style={{
          fontSize: 26, fontWeight: 700, color: C.text, textAlign: "center", margin: "0 0 10px",
          lineHeight: 1.25, fontFamily: FONT.body, letterSpacing: -0.5,
          opacity: phase >= 5 ? 1 : 0, transform: phase >= 5 ? "translateY(0)" : "translateY(12px)",
          transition: "all 0.6s ease-out",
        }}>Your recipes. Your plan.<br/>Your evenings back.</h2>
        <p style={{
          fontSize: 15, color: C.textSecondary, textAlign: "center", lineHeight: 1.6, margin: "0 0 12px",
          opacity: phase >= 5 ? 1 : 0, transform: phase >= 5 ? "translateY(0)" : "translateY(12px)",
          transition: "all 0.6s ease-out 0.1s",
        }}>
          Save the recipes your family loves — then let Sage turn your collection into weekly meal plans, grocery lists, and dinner answers in seconds.
        </p>
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginBottom: 20,
          opacity: phase >= 5 ? 1 : 0, transition: "opacity 0.6s ease-out 0.2s",
        }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={C.gold} strokeWidth="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          <span style={{ fontSize: 12, fontWeight: 600, color: C.gold }}>Your recipes are yours forever — even if you cancel.</span>
        </div>
        <div style={{
          marginTop: "auto", width: "100%",
          opacity: phase >= 5 ? 1 : 0, transform: phase >= 5 ? "translateY(0)" : "translateY(12px)",
          transition: "all 0.6s ease-out 0.25s",
        }}>
          <Button onClick={onNext}>Get Started</Button>
          <ProgressDots active={0} total={5}/>
        </div>
      </div>
    </div>
  );
};

// ============ ONBOARDING: SCATTERED RECIPES ============
const ScatteredRecipes = ({ onNext, onBack }) => (
  <div style={{ height: 852, display: "flex", flexDirection: "column", padding: "60px 28px 20px" }}>
    <BackButton onClick={onBack}/>

// ============ NEW PLAN BUILDER ============
const NewPlanBuilder = ({ onDone, onBack, existingAssignments = {} }) => {
  const [step, setStep] = useState(0);
  const [selectedDays, setSelectedDays] = useState([0,1,2,3,4]);
  const [selectedMeals, setSelectedMeals] = useState(["Breakfast", "Lunch", "Dinner"]);
  const [mealGrid, setMealGrid] = useState({});
  const [headcounts, setHeadcounts] = useState({});
  const [gridInitialized, setGridInitialized] = useState(false);
  const [batchDay, setBatchDay] = useState(null);
  const [constraints, setConstraints] = useState([]);
  const defaultHeadcount = 4;
  const [lockedRecipes, setLockedRecipes] = useState([]);
  const [dots, setDots] = useState(0);

  const days = [
    { short: "Mon", full: "Monday" }, { short: "Tue", full: "Tuesday" }, { short: "Wed", full: "Wednesday" },
    { short: "Thu", full: "Thursday" }, { short: "Fri", full: "Friday" }, { short: "Sat", full: "Saturday" }, { short: "Sun", full: "Sunday" },
  ];
  const mealTypes = ["Breakfast", "Lunch", "Dinner", "Snack"];
  const constraintOptions = [
    { label: "Use up chicken", icon: "🍗", desc: "Prioritize chicken recipes" },
    { label: "Budget-friendly", icon: "💰", desc: "Keep ingredients affordable" },
    { label: "Under 30 min", icon: "⏱️", desc: "Quick meals only" },
    { label: "Minimal cleanup", icon: "🧽", desc: "One-pot and sheet pan meals" },
    { label: "Leftover-friendly", icon: "📦", desc: "Meals that reheat well for lunch" },
    { label: "No repeat proteins", icon: "🔄", desc: "Different protein each dinner" },
  ];
  const vaultRecipes = [
    { name: "Lemon Herb Chicken", time: "35 min", emoji: "🍋" },
    { name: "Mom's Lasagna", time: "90 min", emoji: "🍝" },
    { name: "Thai Basil Stir Fry", time: "25 min", emoji: "🌶️" },
    { name: "Banana Pancakes", time: "20 min", emoji: "🥞" },
    { name: "Greek Yogurt Parfait", time: "10 min", emoji: "🍓" },
    { name: "Pasta Carbonara", time: "30 min", emoji: "🍝" },
    { name: "Chicken Caesar Wraps", time: "15 min", emoji: "🌯" },
    { name: "Grandma's Tomato Soup", time: "45 min", emoji: "🍅" },
  ];

  const toggleDay = (i) => setSelectedDays(prev => prev.includes(i) ? prev.filter(d => d !== i) : [...prev, i]);
  const toggleMeal = (m) => setSelectedMeals(prev => prev.includes(m) ? prev.filter(x => x !== m) : [...prev, m]);
  const toggleConstraint = (c) => setConstraints(prev => prev.includes(c) ? prev.filter(x => x !== c) : [...prev, c]);
  const toggleRecipe = (name) => setLockedRecipes(prev => prev.includes(name) ? prev.filter(x => x !== name) : [...prev, name]);
  const toggleGridCell = (key) => {
    setMealGrid(prev => {
      const wasOn = prev[key];
      if (wasOn) { setHeadcounts(hc => { const next = { ...hc }; delete next[key]; return next; }); }
      else { setHeadcounts(hc => ({ ...hc, [key]: defaultHeadcount })); }
      return { ...prev, [key]: !wasOn };
    });
  };
  const cycleHeadcount = (key, e) => {
    e.stopPropagation();
    setHeadcounts(prev => ({ ...prev, [key]: (prev[key] || defaultHeadcount) >= 6 ? 1 : (prev[key] || defaultHeadcount) + 1 }));
  };
  const initGrid = () => {
    const grid = {}, hc = {};
    selectedDays.forEach(d => { selectedMeals.forEach(m => { grid[d + "-" + m] = true; hc[d + "-" + m] = defaultHeadcount; }); });
    setMealGrid(grid); setHeadcounts(hc); setGridInitialized(true);
  };

  const activeSlots = Object.values(mealGrid).filter(Boolean).length;
  const totalSlots = gridInitialized ? activeSlots : selectedDays.length * selectedMeals.length;
  const stepLabels = ["Days", "Meals", "Customize", "Preferences", "Lock In"];

  const startGenerate = () => {
    setStep(5);
    const dotInterval = setInterval(() => setDots(d => (d + 1) % 4), 350);
    setTimeout(() => { clearInterval(dotInterval); onDone(batchDay); }, 3000);
  };

  const StepBar = () => (
    <div style={{ display: "flex", gap: 4, marginBottom: 20 }}>
      {stepLabels.map((label, i) => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
          <div style={{
            height: 3, width: "100%", borderRadius: 2,
            background: i <= step ? C.sage : C.border, transition: "background 0.3s ease",
          }}/>
          <span style={{ fontSize: 9, fontWeight: 600, color: i <= step ? C.sage : C.textTertiary, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</span>
        </div>
      ))}
    </div>
  );

  // Step 0: Days
  if (step === 0) return (
    <div style={{ height: 852, position: "relative", display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "60px 24px 0", flex: 1, overflowY: "auto" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
          <BackButton onClick={onBack}/>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, margin: 0, letterSpacing: -0.5 }}>New Meal Plan</h1>
        </div>
        <StepBar/>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: C.text, margin: "0 0 6px", letterSpacing: -0.3 }}>Which days do you need planned?</h2>
        <p style={{ fontSize: 14, color: C.textSecondary, margin: "0 0 14px" }}>Tap to select or deselect days.</p>
        <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
          {[{ label: "Weekdays Only", days: [0,1,2,3,4] }, { label: "Full Week", days: [0,1,2,3,4,5,6] }].map(opt => (
            <button key={opt.label} onClick={() => setSelectedDays(opt.days)} style={{
              flex: 1, padding: "10px 0", borderRadius: R.sm, border: `1px solid ${C.border}`,
              background: C.surface, color: C.sage, fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: FONT.body,
            }}>{opt.label}</button>
          ))}
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6, paddingBottom: 8 }}>
          {days.map((d, i) => {
            const sel = selectedDays.includes(i);
            return (
              <button key={i} onClick={() => toggleDay(i)} style={{
                display: "flex", alignItems: "center", gap: 14, padding: "12px 14px",
                background: sel ? C.sageUltraLt : C.surface, borderRadius: R.md,
                border: `1.5px solid ${sel ? C.sage : C.border}`,
                cursor: "pointer", transition: "all 0.15s ease", width: "100%", textAlign: "left", fontFamily: FONT.body,
              }}>
                <div style={{
                  width: 24, height: 24, borderRadius: R.full, flexShrink: 0,
                  border: `2px solid ${sel ? C.sage : C.border}`, background: sel ? C.sage : C.surface,
                  display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s ease",
                }}>
                  {sel && <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>}
                </div>
                <span style={{ fontSize: 15, fontWeight: 500, color: C.text }}>{d.full}</span>
              </button>
            );
          })}
        </div>
      </div>
      <div style={{ padding: "12px 24px 28px", background: C.bg, borderTop: `1px solid ${C.border}` }}>
        <Button onClick={() => setStep(1)}>Next — Choose Meals</Button>
      </div>
    </div>
  );

  // Step 1: Meals
  if (step === 1) return (
    <div style={{ height: 852, position: "relative" }}>
      <div style={{ padding: "60px 24px 0", overflowY: "auto", height: 768 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
          <BackButton onClick={() => setStep(0)}/>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, margin: 0, letterSpacing: -0.5 }}>New Meal Plan</h1>
        </div>
        <StepBar/>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: C.text, margin: "0 0 6px", letterSpacing: -0.3 }}>Which meals should we plan?</h2>
        <p style={{ fontSize: 14, color: C.textSecondary, margin: "0 0 20px" }}>Pick the meals you want covered each day.</p>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {mealTypes.map(m => {
            const icons = { Breakfast: "☕", Lunch: "🥗", Dinner: "🍳", Snack: "🍎" };
            const descs = { Breakfast: "Start the day right", Lunch: "Midday fuel", Dinner: "The main event", Snack: "Between-meal bites" };
            const sel = selectedMeals.includes(m);
            return (
              <button key={m} onClick={() => toggleMeal(m)} style={{
                display: "flex", alignItems: "center", gap: 14, padding: "16px",
                background: sel ? C.sageUltraLt : C.surface, borderRadius: R.lg,
                border: `1.5px solid ${sel ? C.sage : C.border}`,
                cursor: "pointer", transition: "all 0.15s ease", width: "100%", textAlign: "left", fontFamily: FONT.body,
              }}>
                <span style={{ fontSize: 28 }}>{icons[m]}</span>
                <div style={{ flex: 1 }}>
                  <p style={{ fontSize: 16, fontWeight: 600, color: C.text, margin: 0 }}>{m}</p>
                  <p style={{ fontSize: 12, color: C.textSecondary, margin: 0 }}>{descs[m]}</p>
                </div>
                <div style={{
                  width: 26, height: 26, borderRadius: R.full,
                  border: `2px solid ${sel ? C.sage : C.border}`, background: sel ? C.sage : C.surface,
                  display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s ease",
                }}>
                  {sel && <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M20 6L9 17l-5-5"/></svg>}
                </div>
              </button>
            );
          })}
        </div>
        <div style={{ marginTop: 16, padding: "12px 16px", borderRadius: R.md, background: C.goldLt, display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 16 }}>📋</span>
          <p style={{ fontSize: 13, color: C.text, margin: 0 }}>
            <span style={{ fontWeight: 600 }}>{totalSlots} meal slots</span>
            <span style={{ color: C.textSecondary }}> across {selectedDays.length} days</span>
          </p>
        </div>
        <div style={{ marginTop: 20, paddingBottom: 20 }}>
          <Button onClick={() => { initGrid(); setStep(2); }}>Next — Customize Your Week</Button>
        </div>
      </div>
    </div>
  );

  // Step 2: Grid
  if (step === 2) return (
    <div style={{ height: 852, position: "relative" }}>
      <div style={{ padding: "60px 24px 0", overflowY: "auto", height: 768 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 20 }}>
          <BackButton onClick={() => setStep(1)}/>
          <h1 style={{ fontSize: 24, fontWeight: 700, color: C.text, margin: 0, letterSpacing: -0.5 }}>New Meal Plan</h1>
        </div>
        <StepBar/>
        <h2 style={{ fontSize: 22, fontWeight: 700, color: C.text, margin: "0 0 6px", letterSpacing: -0.3 }}>Fine-tune your week</h2>
        <p style={{ fontSize: 14, color: C.textSecondary, margin: "0 0 16px" }}>Tap a cell to toggle. Tap the number to change servings.</p>
        <div style={{ overflowX: "auto", marginBottom: 16 }}>
          <div style={{ display: "grid", gridTemplateColumns: `72px repeat(${selectedDays.length}, 1fr)`, gap: 4 }}>
            <div/>
            {selectedDays.map(d => (
              <div key={d} style={{ textAlign: "center", padding: "8px 0", fontSize: 11, fontWeight: 700, color: C.sage }}>{days[d].short}</div>
            ))}
            {selectedMeals.map(meal => (
              <React.Fragment key={meal}>
                <div style={{ display: "flex", alignItems: "center", padding: "0 2px", fontSize: 11, fontWeight: 600, color: C.text, height: 52 }}>{meal}</div>
                {selectedDays.map(d => {
                  const key = d + "-" + meal;
                  const on = mealGrid[key];
                  const count = headcounts[key] || defaultHeadcount;
                  return (
                    <div key={key} style={{
                      height: 52, borderRadius: R.sm, position: "relative",
                      background: on ? C.sage : `${C.border}60`,
                      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                      transition: "all 0.15s ease", cursor: "pointer",
                    }} onClick={() => toggleGridCell(key)}>
                      {on ? (
                        <>
                          <button onClick={(e) => cycleHeadcount(key, e)} style={{
                            background: "rgba(255,255,255,0.2)", border: "none", cursor: "pointer",
                            width: 28, height: 28, borderRadius: R.full,
                            display: "flex", alignItems: "center", justifyContent: "center",
                            fontSize: 15, fontWeight: 700, color: C.surface, fontFamily: FONT.body,
                          }}>{count}</button>
                        </>
                      ) : (
                        <div style={{ width: 6, height: 6, borderRadius: 3, background: C.textTertiary, opacity: 0.3 }}/>

                })}

          </div>
        </div>
        <div style={{ padding: "12px 16px", borderRadius: R.md, background: C.goldLt, display: "flex", alignItems: "center", gap: 8, marginBottom: 16 }}>
          <span style={{ fontSize: 16 }}>📋</span>
          <p style={{ fontSize: 13, color: C.text, margin: 0 }}>
            <span style={{ fontWeight: 600 }}>{activeSlots} meals</span>
            <span style={{ color: C.textSecondary }}> to plan across {selectedDays.length} days</span>

          <Button onClick={() => setStep(3)}>Next — Set Preferences</Button>

        {lockedRecipes.length > 0 && (
          <div style={{

          </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {vaultRecipes.map(r => {

            return (
              <button key={r.name} onClick={() => toggleRecipe(r.name)} style={{
                display: "flex", alignItems: "center", gap: 12, padding: "12px 14px",

                  width: 42, height: 42, borderRadius: R.sm, flexShrink: 0,

                  {sel ? (
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>

                <div style={{ flex: 1 }}>
                  <p style={{ fontSize: 14, fontWeight: 600, color: C.text, margin: 0 }}>{r.name}</p>

        <div style={{ marginTop: 20, display: "flex", flexDirection: "column", gap: 8, paddingBottom: 20 }}>
          <Button onClick={startGenerate}>Generate My Plan {lockedRecipes.length > 0 ? `(${lockedRecipes.length} locked)` : ""}</Button>

        </div>
      </div>
    </div>
  );

  // Step 5: Generating
  return (
    <div style={{ height: 852, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "0 40px" }}>
      <div style={{ width: 72, height: 72, borderRadius: R.full, background: C.sageLt, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 28 }}>

        {lockedRecipes.length > 0

};

                    position: "absolute", top: 6, right: 6, width: 24, height: 24, borderRadius: R.full,
                    background: "rgba(255,255,255,0.9)", display: "flex", alignItems: "center", justifyContent: "center",

                    <svg width="13" height="13" viewBox="0 0 24 24" fill={C.error} stroke={C.error} strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                  </div>

        <div style={{ marginTop: 20, paddingBottom: 20 }}>

              <div style={{ width: 22, height: 22, borderRadius: R.full, background: `${C.gold}15`, display: "flex", alignItems: "center", justifyContent: "center" }}>

          <div style={{
            display: "flex", gap: 10, overflowX: "auto", paddingBottom: 8,
            marginLeft: -24, marginRight: -24, paddingLeft: 24, paddingRight: 24,
          }}>
            {aiSuggestions.map((recipe, i) => <AISuggestionCard key={i} recipe={recipe}/>)}
          </div>
        </div>
      </div>
      <TabBar active="recipes" onNavigate={onNavigate}/>
    </div>
  );
};

const URLImportFlow = ({ onBack, onNavigate }) => {

  const [parseProgress, setParseProgress] = useState(0);

  useEffect(() => {
    if (importStep === "parsing") {
      const interval = setInterval(() => {
        setParseProgress(p => {
          if (p >= 100) { clearInterval(interval); setTimeout(() => setImportStep("review"), 400); return 100; }
          return p + Math.random() * 15 + 5;
        });
      }, 200);
      return () => clearInterval(interval);
    }
  }, [importStep]);

  // Hub

        <div style={{ display: "flex", justifyContent: "center", gap: 16, paddingBottom: 8 }}>
          {["Restore Purchase", "Terms", "Privacy"].map(link => (
            <span key={link} style={{ fontSize: 11, color: C.textTertiary, cursor: "pointer" }}>{link}</span>
          ))}
        </div>
      </div>
    </div>
  );
};

// ============ MAIN APP ============
function SagePrototype() {
  const [screen, setScreen] = useState("welcome");
  const [selectedRecipe, setSelectedRecipe] = useState(null);
  const [recipeOrigin, setRecipeOrigin] = useState("plan");
  const [subtitleIdx, setSubtitleIdx] = useState(0);
  const [planBatchDay, setPlanBatchDay] = useState(null);
  const [planAssignments, setPlanAssignments] = useState({});
  const [favorites, setFavorites] = useState(["Mom's Lasagna", "Banana Pancakes"]);

  const toggleFavorite = (name) => {
    setFavorites(prev => prev.includes(name) ? prev.filter(x => x !== name) : [...prev, name]);
  };

  const navigate = (id) => {
    if (id === "plan") setScreen("plan");
    else if (id === "grocery") setScreen("grocery");
    else if (id === "recipes") setScreen("vault");
    else if (id === "profile") setScreen("profile");
  };

  const handleAddToPlan = ({ recipe, dayIndex, mealType }) => {
    setPlanAssignments(prev => ({ ...prev, [`${dayIndex}-${mealType}`]: recipe }));
  };

  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: "linear-gradient(135deg, #111110 0%, #1a1a18 50%, #111110 100%)", padding: 40,
      flexDirection: "column", gap: 20,
    }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 4 }}>
        <div style={{ width: 8, height: 8, borderRadius: 4, background: C.sage }}/>
        <span style={{ color: "#6B6B63", fontSize: 12, fontWeight: 600, letterSpacing: 1.5, textTransform: "uppercase", fontFamily: FONT.body }}>Sage — Interactive Prototype</span>
        <div style={{
          padding: "3px 8px", borderRadius: 4, background: `${C.sage}20`,
          fontSize: 10, fontWeight: 600, color: C.sage, letterSpacing: 0.5,
        }}>v2.0</div>
      </div>

      <PhoneFrame>
        {screen === "welcome" && <Welcome onNext={() => setScreen("scattered")} subtitleIndex={subtitleIdx}/>}
        {screen === "scattered" && <ScatteredRecipes onNext={() => setScreen("preferences")} onBack={() => setScreen("welcome")}/>}
        {screen === "preferences" && <Preferences onNext={() => setScreen("mealpicker")} onBack={() => setScreen("scattered")}/>}
        {screen === "mealpicker" && <MealPicker onNext={() => setScreen("generating")} onBack={() => setScreen("preferences")}/>}
        {screen === "generating" && <GeneratingPlan onDone={() => setScreen("plan")}/>}
        {screen === "plan" && <WeeklyPlan onRecipeTap={(meal) => { setSelectedRecipe(meal); setRecipeOrigin("plan"); setScreen("recipe"); }} onNavigate={navigate} onNewPlan={() => setScreen("newplan")} batchDay={planBatchDay} planAssignments={planAssignments}/>}
        {screen === "newplan" && <NewPlanBuilder onBack={() => setScreen("plan")} onDone={(batchDayVal) => { setPlanBatchDay(batchDayVal ?? null); setScreen("plan"); }} existingAssignments={planAssignments}/>}
        {screen === "vault" && <RecipeVault onNavigate={navigate} onRecipeTap={(meal) => { setSelectedRecipe(meal); setRecipeOrigin("vault"); setScreen("recipe"); }} onImport={() => setScreen("import")} favorites={favorites} onToggleFavorite={toggleFavorite}/>}
        {screen === "import" && <URLImportFlow onBack={() => setScreen("vault")} onNavigate={navigate}/>}
        {screen === "recipe" && <RecipeDetail recipe={selectedRecipe} origin={recipeOrigin} onBack={(dest) => setScreen(dest || recipeOrigin)} onAddToPlan={handleAddToPlan} isFavorite={favorites.includes(selectedRecipe?.name)} onToggleFavorite={toggleFavorite}/>}
        {screen === "grocery" && <GroceryList onNavigate={navigate}/>}
        {screen === "profile" && <Profile onNavigate={navigate} onUpgrade={() => setScreen("paywall")}/>}
        {screen === "paywall" && <Paywall onClose={() => setScreen("profile")} onSubscribe={() => setScreen("plan")}/>}
      </PhoneFrame>

      <div style={{ display: "flex", gap: 6, marginTop: 8, flexWrap: "wrap", justifyContent: "center", maxWidth: 600 }}>
        {["welcome", "scattered", "preferences", "mealpicker", "plan", "newplan", "vault", "import", "grocery", "profile", "paywall"].map(s => (
          <button key={s} onClick={() => setScreen(s)} style={{
            padding: "6px 14px", borderRadius: 8, border: `1px solid ${screen === s ? C.sage : "rgba(255,255,255,0.08)"}`,
            background: screen === s ? C.sage : "transparent", color: screen === s ? "white" : "#6B6B63",
            fontSize: 11, fontWeight: 500, cursor: "pointer", textTransform: "capitalize",
            fontFamily: FONT.body, transition: "all 0.15s ease",
          }}>{s}</button>
        ))}
      </div>

      {screen === "welcome" && (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, marginTop: 4 }}>
          <span style={{ color: "#6B6B63", fontSize: 10, textTransform: "uppercase", letterSpacing: 1.5, fontWeight: 600 }}>Subtitle options</span>
          <div style={{ display: "flex", gap: 6 }}>
            {SUBTITLE_OPTIONS.map((opt, i) => (
              <button key={i} onClick={() => setSubtitleIdx(i)} style={{
                padding: "6px 12px", borderRadius: 8,
                border: `1px solid ${subtitleIdx === i ? C.gold : "rgba(255,255,255,0.08)"}`,
                background: subtitleIdx === i ? C.gold : "transparent",
                color: subtitleIdx === i ? "white" : "#6B6B63",
                fontSize: 11, fontWeight: 500, cursor: "pointer", fontFamily: FONT.body,
              }}>{opt}</button>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(SagePrototype)
    );
  </script>
</body>
</html>
